add_newline = false
command_timeout = 500
format = "$python$directory$git_branch$git_status$character"
right_format = ""

[character]
success_symbol = "[❯](bold green) "
error_symbol = "[❯](bold red) "
vimcmd_symbol = "[❮](bold yellow) "

[directory]
format = "[  $path]($style)[$read_only]($read_only_style) "
style = "blue"
truncation_length = 3
truncation_symbol = "../"
fish_style_pwd_dir_length = 1

[python]
pyenv_version_name = true
pyenv_prefix = ""
symbol = " "
format = "[${symbol}${version}( (${virtualenv}))]($style) "
style = "yellow"

[git_branch]
symbol = " "
format = "[${symbol}$branch]($style)"
style = "green"

[git_status]
format = "[($modified$staged$renamed$deleted$untracked$conflicted$ahead_behind$stashed)]($style) "
style = "cyan"
modified = " !"
staged = " +"
renamed = " »"
deleted = " x"
untracked = " ?"
conflicted = " !"
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
stashed = " ≡"
up_to_date = ""

